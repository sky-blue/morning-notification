name: 매일 아침 알림

on:
  schedule:
    - cron: '30 21 * * *'  # 한국시간 오전 6시 30분
  workflow_dispatch:

jobs:
  send-discord:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python send-email.py
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}