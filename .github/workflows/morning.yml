name: 매일 아침 알림

on:
  schedule:
    - cron: '0 20 * * *'  # 한국시간 오전 5시 00분
  workflow_dispatch:

jobs:
  send-discord:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python send-email.py
        env:
          NEIS_API_KEY: ${{ secrets.NEIS_API_KEY }}
          DISCORD_WEBHOOK_1_1: ${{ secrets.DISCORD_WEBHOOK_1_1 }}
          DISCORD_WEBHOOK_1_2: ${{ secrets.DISCORD_WEBHOOK_1_2 }}
          DISCORD_WEBHOOK_1_3: ${{ secrets.DISCORD_WEBHOOK_1_3 }}
          DISCORD_WEBHOOK_1_4: ${{ secrets.DISCORD_WEBHOOK_1_4 }}
          DISCORD_WEBHOOK_1_5: ${{ secrets.DISCORD_WEBHOOK_1_5 }}
          DISCORD_WEBHOOK_1_6: ${{ secrets.DISCORD_WEBHOOK_1_6 }}