name: 매일 아침 알림

on:
  schedule:
    - cron: '0 19 * * *'   # 한국시간 오전 5시
    - cron: '0 10 * * *'   # 한국시간 저녁 8시
  workflow_dispatch:
    inputs:
      mode:
        description: 'morning or preview'
        required: true

jobs:
  send-discord:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: 아침 알림
        if: github.event.schedule == '0 20 * * *' || github.event.inputs.mode == 'morning'
        run: python send-discord.py morning
        env:
          NEIS_API_KEY: ${{ secrets.NEIS_API_KEY }}
          DISCORD_WEBHOOK_ADMIN: ${{ secrets.DISCORD_WEBHOOK_ADMIN }}
          DISCORD_WEBHOOK_1_1: ${{ secrets.DISCORD_WEBHOOK_1_1 }}
          DISCORD_WEBHOOK_1_2: ${{ secrets.DISCORD_WEBHOOK_1_2 }}
          DISCORD_WEBHOOK_1_3: ${{ secrets.DISCORD_WEBHOOK_1_3 }}
          DISCORD_WEBHOOK_1_4: ${{ secrets.DISCORD_WEBHOOK_1_4 }}
          DISCORD_WEBHOOK_1_5: ${{ secrets.DISCORD_WEBHOOK_1_5 }}
          DISCORD_WEBHOOK_1_6: ${{ secrets.DISCORD_WEBHOOK_1_6 }}
      - name: 관리자 미리보기
        if: github.event.schedule == '0 11 * * *' || github.event.inputs.mode == 'preview'
        run: python send-discord.py preview
        env:
          NEIS_API_KEY: ${{ secrets.NEIS_API_KEY }}
          DISCORD_WEBHOOK_ADMIN: ${{ secrets.DISCORD_WEBHOOK_ADMIN }}